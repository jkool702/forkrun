name: Build forkrun_ring.so (multiarch) and update frun.bash

on:
  push:
    paths:
      - 'forkrun_ring.c'
      - 'META'
      - '.github/workflows/forkrun_release.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # x86_64: The Triple Build (v2, v3, v4)
          - arch: x86_64
            platform: linux/amd64
            docker_image: fedora:latest
            extra_flags: "" # Handled manually in script

          # AArch64
          - arch: aarch64
            platform: linux/arm64
            docker_image: fedora:latest
            extra_flags: "-march=armv8-a+crc"

          # PPC64LE
          - arch: ppc64le
            platform: linux/ppc64le
            docker_image: fedora:latest
            extra_flags: ""

          # S390X
          - arch: s390x
            platform: linux/s390x
            docker_image: fedora:latest
            extra_flags: ""

          # RISC-V 64
          - arch: riscv64
            platform: linux/riscv64
            docker_image: fedorariscv/base:latest
            extra_flags: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build in Docker (${{ matrix.arch }})
        # continue-on-error allows the workflow to succeed even if an arch fails
        continue-on-error: true
        run: |
          set -e
          mkdir -p artifacts

          # Pass variables into the Docker container via environment variables
          docker run --rm \
            -v $PWD:/src \
            -w /src \
            --platform=${{ matrix.platform }} \
            -e TARGET_ARCH="${{ matrix.arch }}" \
            -e EXTRA_FLAGS="${{ matrix.extra_flags }}" \
            ${{ matrix.docker_image }} \
            bash -c '
              # 1. Install Dependencies (Fedora/RHEL style)
              dnf install -y @development-tools gcc make bash-devel git grep sed binutils || \
              (apt-get update && apt-get install -y gcc make libbash-dev git grep sed binutils)

              # 2. Extract Version from META
              FR_VERSION="unknown"
              if [ -f META ]; then
                 FR_VERSION=$(grep -E "^VERSION:" META | sed -E "s/^VERSION:[ \t]*//")
              fi
              echo "Compiling Version: $FR_VERSION"

              # 3. Define Common Flags
              OPT_FLAGS="-O3 -flto=auto -fno-strict-aliasing -fno-semantic-interposition -fno-math-errno -ftree-loop-im -ftree-loop-ivcanon -fPIC "
              WARN_FLAGS="-DNDEBUG -Wall -Wextra "
              INCLUDES="-I/usr/include/bash -I/usr/include/bash/include -I/usr/include/bash/builtins "

              DEFS=(
                 "-DSHELL"
                 "-DHAVE_CONFIG_H"
                 "-DBUILD_OS=\"Linux\""
                 "-DFORKRUN_RING_VERSION=\"$FR_VERSION\""
                 "-DCOMPILER_FLAGS=\"$OPT_FLAGS\""
              )

              # Function to build specific variant
              build_variant() {
                 local arch_name="$1"
                 local march_flag="$2"
                 local out_file="artifacts/forkrun_ring.${arch_name}.so"

                 echo ">>> Building $arch_name..."

                 # Dynamic Arch Definition
                 local ARCH_DEF="-DBUILD_ARCH=\"$arch_name\""

                 gcc forkrun_ring.c \
                    $OPT_FLAGS $WARN_FLAGS $INCLUDES \
                    "${DEFS[@]}" "$ARCH_DEF" \
                    -shared \
                    $march_flag \
                    -o "$out_file"

                 strip --strip-unneeded "$out_file"

                 # SANITY CHECK: Try to enable and run version check
                 echo ">>> Testing loadable..."
                 enable -f "$out_file" ring_version && \
                 ring_version -a || exit 1
                 enable -d ring_version
              }

              # 4. Logic Branch based on Architecture
              if[ "$TARGET_ARCH" == "x86_64" ]; then
                  build_variant "x86-64-v2" "-march=x86-64-v2"
                  build_variant "x86-64-v3" "-march=x86-64-v3"
                  build_variant "x86-64-v4" "-march=x86-64-v4"
              else
                  build_variant "$TARGET_ARCH" "$EXTRA_FLAGS"
              fi

              ls -l artifacts/
            '

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: forkrun-libs-${{ matrix.arch }}
          path: artifacts/*.so
          if-no-files-found: ignore # Do not fail if build failed softly

  embed:
    name: Embed Base64 into frun.bash
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download newly built artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: forkrun-libs-*
          merge-multiple: true
          path: new_artifacts

      - name: Merge new artifacts with repository cache
        run: |
          # Ensure target directory exists in the repo
          mkdir -p ring_loadables/forkrun-libs

          echo "Current cached loadables:"
          ls -l ring_loadables/forkrun-libs/ || true

          # Overwrite cached .so files with any new ones that successfully built
          if [ "$(ls -A new_artifacts 2>/dev/null)" ]; then
            echo "Merging newly built artifacts..."
            cp -v new_artifacts/*.so ring_loadables/forkrun-libs/
          else
            echo "WARNING: No new artifacts found. Falling back entirely to cached .so files."
          fi

      - name: Create Updater Script
        run: |
          # Use raw EOF to prevent GH Actions from evaluating bash variables
          cat << 'EOF' > updater.sh
          update_frun_base64() (

          if [[ "$1" ]] && [[ -f "$1" ]]; then
              frun_path="$1"
          else
              frun_path="./frun.bash"
          fi

          [[ -f "$frun_path" ]] || return 1

          . <( { echoFlag=false; while true; do IFS= read -r line; [[ "$line" == *'_forkrun_file_to_base64() {'* ]] && echoFlag=true; $echoFlag && echo "$line"; $echoFlag && [[ "$line" == '}'* ]] && break; done; } <"${frun_path}" )

          (
          unset b64
          declare -A b64
          for nn in ./**/*.so; do
          mm="${nn#*forkrun_ring.}"
          mm="${mm%.so}"
          mm="${mm//-/_}"
          b64[$mm]="$(_forkrun_file_to_base64 "$nn")"
          done
          {
          while IFS= read -r line; do
          echo "$line"
          [[ "$line" == *'# <@@@@@< _BASE64_START_ >@@@@@> #'* ]] && break
          done
          echo
          declare -p b64
          printf '\n%s\n' '_forkrun_bootstrap_setup --force'
          } <"${frun_path}" >"${frun_path%.bash}.new.bash"

          [[ -s "${frun_path%.bash}.new.bash" ]] && command mv -f "${frun_path%.bash}.new.bash" "${frun_path}"

          )

          )
          EOF

      - name: Generate New frun.bash Script
        shell: bash
        run: |
          shopt -s globstar
          source updater.sh

          # Change directory to where the .so files live,
          # and point the function back up to the root frun.bash
          cd ring_loadables/forkrun-libs
          update_frun_base64 ../../frun.bash

          # Fix permissions
          cd ../../
          chmod +x frun.bash

      - name: Verify Final Script
        run: |
          # Sanity check: Does the script run and load?
          # This relies on the GH Runner being x86_64, which it is.
          . ./frun.bash && ring_version -a

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "build: update embedded ring loadables and cache"
          title: "🤖 Auto-Build: Update Ring Loadables"
          body: |
            This PR updates the embedded `forkrun_ring` binaries in `frun.bash` and the cached `.so` files in `ring_loadables/forkrun-libs/`.

            Generated by GitHub Actions Run:[${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

            **Architectures:**
            - x86_64 (v2, v3, v4)
            - aarch64, ppc64le, s390x, riscv64

            *(Note: If any architecture failed to build, its previously cached `.so` file was retained).*
          branch: "auto-build/update-loadables"
          delete-branch: true
